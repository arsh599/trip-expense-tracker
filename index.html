<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="Track your trip expenses">
    <link rel="manifest" href="manifest.json">
    <title>Trip Expense Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent: #2563eb;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
            --accent: #3b82f6;
            --danger: #f87171;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .theme-toggle {
            background: transparent;
            border: none;
            padding: 2px;
            cursor: pointer;
            font-size: 14px;
        }

        .theme-toggle:active {
            opacity: 0.6;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-top: 24px;
            margin-bottom: 16px;
        }

        h2:first-child {
            margin-top: 0;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-subtext {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .balance-box {
            grid-column: 1 / -1;
            background: var(--bg-primary);
            border: 2px solid var(--accent);
        }

        .balance-box .stat-value {
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        button:active {
            opacity: 0.8;
        }

        .secondary-btn {
            background: var(--bg-primary);
            color: var(--accent);
            border: 1px solid var(--border-color);
            font-weight: 600;
        }

        .secondary-btn:active {
            background: var(--bg-secondary);
        }

        .hidden {
            display: none;
        }

        .currency-info {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .contributor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .contributor-name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
        }

        .contributor-amount {
            color: var(--accent);
            font-weight: 600;
            font-size: 14px;
        }

        .remove-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
            transition: opacity 0.2s;
        }

        .remove-btn:active {
            opacity: 0.8;
        }

        .expense-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
            gap: 8px;
        }

        .expense-info {
            flex: 1;
        }

        .expense-desc {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .expense-date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .expense-amount {
            color: var(--accent);
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }

        .delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .delete-btn:active {
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
            font-size: 14px;
        }

        .reset-btn {
            background: var(--danger);
            margin-top: 24px;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            .card {
                padding: 16px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Expenses</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        </div>

        <div id="setupView" class="card">
            <h2>Currency Setup</h2>
            <div class="currency-info">
                Budget Currency: <strong>USD</strong> | Expense Currency: <strong>INR</strong>
            </div>

            <div class="input-group">
                <label for="exchangeRate">Exchange Rate (₹ per $)</label>
                <input type="number" id="exchangeRate" placeholder="95.24" step="0.01" value="95.24" min="0">
            </div>

            <h2>Add Contributors</h2>
            
            <div class="input-group">
                <label for="contributorName">Name</label>
                <input type="text" id="contributorName" placeholder="e.g., John">
            </div>
            <div class="input-group">
                <label for="contributorAmount">Budget (USD)</label>
                <input type="number" id="contributorAmount" placeholder="0.00" step="0.01" min="0">
            </div>
            <button class="secondary-btn" onclick="addContributor()">Add</button>

            <div id="contributorsList" style="margin-top: 20px;"></div>

            <button onclick="startTracking()">Start Tracking</button>
        </div>

        <div id="trackerView" class="hidden">
            <div class="card">
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-label">Budget</div>
                        <div class="stat-value" id="budgetDisplay">₹0</div>
                        <div class="stat-subtext" id="budgetUsd">$0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Spent</div>
                        <div class="stat-value" id="spentDisplay">₹0</div>
                        <div class="stat-subtext" id="spentUsd">$0</div>
                    </div>
                    <div class="balance-box stat-box">
                        <div class="stat-label">Remaining</div>
                        <div class="stat-value" id="balanceDisplay">₹0</div>
                        <div class="stat-subtext" id="balanceUsd">$0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Rate: ₹<span id="currentRate">95.24</span> / $</h2>
                <div class="input-group">
                    <label for="trackerExchangeRate">Update Exchange Rate</label>
                    <input type="number" id="trackerExchangeRate" placeholder="95.24" step="0.01" min="0">
                </div>
                <button class="secondary-btn" onclick="updateExchangeRate()">Update</button>

                <h2 style="margin-top: 24px;">Contributors</h2>
                <div id="trackerContributorsList"></div>

                <h2 style="margin-top: 24px;">Add Expense</h2>
                <div class="input-group">
                    <label for="expenseDesc">Description</label>
                    <input type="text" id="expenseDesc" placeholder="e.g., Lunch" maxlength="50">
                </div>
                <div class="input-group">
                    <label for="expenseDate">Date</label>
                    <input type="date" id="expenseDate">
                </div>
                <div class="input-group">
                    <label for="expenseAmount">Amount (₹)</label>
                    <input type="number" id="expenseAmount" placeholder="0.00" step="0.01" min="0">
                </div>
                <button onclick="addExpense()">Add Expense</button>

                <h2 style="margin-top: 24px;">Expenses</h2>
                <div id="expensesList"></div>

                <button class="reset-btn" onclick="resetTracker()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        const THEME_KEY = 'tripTrackerTheme';

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
            updateThemeButton(theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_KEY, newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = theme === 'light' ? '🌙' : '☀️';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        function loadData() {
            const stored = localStorage.getItem('tripBudget');
            if (!stored) {
                return { contributors: [], expenses: [], exchangeRate: 95.24 };
            }
            return JSON.parse(stored);
        }

        function saveData(data) {
            localStorage.setItem('tripBudget', JSON.stringify(data));
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
        }

        function displayContributors() {
            const data = loadData();
            const list = document.getElementById('contributorsList');
            
            if (!list) return;
            
            if (data.contributors.length === 0) {
                list.innerHTML = '<div class="empty-state">No contributors yet</div>';
            } else {
                let html = '';
                for (let c of data.contributors) {
                    const inr = (c.amount * data.exchangeRate).toFixed(2);
                    html += `
                        <div class="contributor-item">
                            <div class="contributor-name">${c.name}</div>
                            <div class="contributor-amount">$${c.amount.toFixed(2)} / ₹${inr}</div>
                            <button class="remove-btn" onclick="removeContributor(${c.id})">Remove</button>
                        </div>
                    `;
                }
                list.innerHTML = html;
            }
        }

        function addContributor() {
            const name = document.getElementById('contributorName').value.trim();
            const amount = parseFloat(document.getElementById('contributorAmount').value);
            
            if (!name || !amount || amount <= 0) {
                alert('Fill in all fields');
                return;
            }
            
            const data = loadData();
            data.exchangeRate = parseFloat(document.getElementById('exchangeRate').value) || 95.24;
            data.contributors.push({ id: Date.now(), name, amount });
            saveData(data);
            
            document.getElementById('contributorName').value = '';
            document.getElementById('contributorAmount').value = '';
            displayContributors();
        }

        function removeContributor(id) {
            const data = loadData();
            data.contributors = data.contributors.filter(c => c.id !== id);
            saveData(data);
            displayContributors();
        }

        function startTracking() {
            const data = loadData();
            if (data.contributors.length === 0) {
                alert('Add at least one contributor');
                return;
            }
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('trackerView').classList.remove('hidden');
            document.getElementById('trackerExchangeRate').value = data.exchangeRate;
            document.getElementById('currentRate').textContent = data.exchangeRate.toFixed(2);
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('expenseDate').value = today;
            updateDisplay();
        }

        function updateExchangeRate() {
            const rate = parseFloat(document.getElementById('trackerExchangeRate').value);
            if (!rate || rate <= 0) {
                alert('Enter a valid exchange rate');
                return;
            }
            const data = loadData();
            data.exchangeRate = rate;
            saveData(data);
            document.getElementById('currentRate').textContent = rate.toFixed(2);
            updateDisplay();
        }

        function addExpense() {
            const desc = document.getElementById('expenseDesc').value.trim();
            const date = document.getElementById('expenseDate').value;
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            
            if (!desc || !date || !amount || amount <= 0) {
                alert('Fill in all fields');
                return;
            }
            
            const data = loadData();
            data.expenses.push({ id: Date.now(), desc, date, amount });
            saveData(data);
            
            document.getElementById('expenseDesc').value = '';
            document.getElementById('expenseAmount').value = '';
            updateDisplay();
        }

        function deleteExpense(id) {
            const data = loadData();
            data.expenses = data.expenses.filter(e => e.id !== id);
            saveData(data);
            updateDisplay();
        }

        function updateDisplay() {
            const data = loadData();
            const { contributors, expenses, exchangeRate } = data;
            
            if (contributors.length === 0) {
                document.getElementById('setupView').classList.remove('hidden');
                document.getElementById('trackerView').classList.add('hidden');
                displayContributors();
                return;
            }
            
            const budgetUsd = contributors.reduce((sum, c) => sum + c.amount, 0);
            const budgetInr = budgetUsd * exchangeRate;
            const spentInr = expenses.reduce((sum, e) => sum + e.amount, 0);
            const spentUsd = spentInr / exchangeRate;
            const remainingInr = budgetInr - spentInr;
            const remainingUsd = remainingInr / exchangeRate;
            
            document.getElementById('budgetDisplay').textContent = `₹${budgetInr.toFixed(0)}`;
            document.getElementById('budgetUsd').textContent = `$${budgetUsd.toFixed(2)}`;
            document.getElementById('spentDisplay').textContent = `₹${spentInr.toFixed(0)}`;
            document.getElementById('spentUsd').textContent = `$${spentUsd.toFixed(2)}`;
            document.getElementById('balanceDisplay').textContent = `₹${remainingInr.toFixed(0)}`;
            document.getElementById('balanceUsd').textContent = `$${remainingUsd.toFixed(2)}`;
            
            const trackerList = document.getElementById('trackerContributorsList');
            let html = '';
            for (let c of contributors) {
                const inr = (c.amount * exchangeRate).toFixed(2);
                html += `
                    <div class="contributor-item">
                        <div class="contributor-name">${c.name}</div>
                        <div class="contributor-amount">$${c.amount.toFixed(2)} / ₹${inr}</div>
                    </div>
                `;
            }
            trackerList.innerHTML = html;
            
            const list = document.getElementById('expensesList');
            if (expenses.length === 0) {
                list.innerHTML = '<div class="empty-state">No expenses yet</div>';
            } else {
                const sortedExpenses = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
                let expHtml = '';
                for (let e of sortedExpenses) {
                    const usd = (e.amount / exchangeRate).toFixed(2);
                    expHtml += `
                        <div class="expense-item">
                            <div class="expense-info">
                                <div class="expense-desc">${e.desc}</div>
                                <div class="expense-date">${formatDate(e.date)}</div>
                            </div>
                            <div class="expense-amount">₹${e.amount.toFixed(0)} / $${usd}</div>
                            <button class="delete-btn" onclick="deleteExpense(${e.id})">Delete</button>
                        </div>
                    `;
                }
                list.innerHTML = expHtml;
            }
        }

        function resetTracker() {
            if (confirm('Clear everything?')) {
                localStorage.removeItem('tripBudget');
                document.getElementById('setupView').classList.remove('hidden');
                document.getElementById('trackerView').classList.add('hidden');
                document.getElementById('contributorName').value = '';
                document.getElementById('contributorAmount').value = '';
                document.getElementById('exchangeRate').value = '95.24';
                displayContributors();
            }
        }

        initTheme();
        displayContributors();
    </script>
</body>
</html>
